# 国内默认走 DaoCloud 镜像；海外可覆盖：
# PYTHON_IMAGE=python:3.12-slim-bookworm NODE_IMAGE=node:22-alpine NGINX_IMAGE=nginx:1.27-alpine docker compose up --build -d
x-build-args: &build-args
  PYTHON_IMAGE: ${PYTHON_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim-bookworm}
  NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:22-alpine}
  NGINX_IMAGE: ${NGINX_IMAGE:-docker.m.daocloud.io/library/nginx:1.27-alpine}
  PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
  NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        <<: *build-args
    container_name: ai-music-backend
    env_file:
      - backend/.env
    environment:
      HOST: 0.0.0.0
      PORT: 8099
      CORS_ORIGINS: http://localhost:5199,http://127.0.0.1:5199
    volumes:
      - backend-data:/app/backend/data
      - backend-logs:/app/backend/logs
    ports:
      - "8099:8099"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8099/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        <<: *build-args
    container_name: ai-music-frontend
    ports:
      - "5199:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
  backend-logs:
